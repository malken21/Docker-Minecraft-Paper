name: Release Paper Docker Images
on:
  schedule:
    # 毎日 UTC 0:00 (日本時間 9:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  list-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate matrix
        id: set-matrix
        run: |
          MATRIX=$(python updatePaper.py get-matrix)
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: list-versions
    runs-on: ubuntu-latest
    if: ${{ needs.list-versions.outputs.matrix != '' && toJson(fromJson(needs.list-versions.outputs.matrix).include) != '[]' }}
    strategy:
      matrix: ${{ fromJson(needs.list-versions.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Convert image name to lowercase
        id: prep
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${REPO_OWNER}" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download jarfile
        run: |
          python updatePaper.py download ./docker/paper.jar "${{ matrix.url }}" "${{ matrix.sha256 }}"

      - name: Detect required Java version from jar
        id: detect-java
        run: |
          JAVA_VER=$(python updatePaper.py get-jar-version ./docker/paper.jar)
          echo "Detected Java version: $JAVA_VER"
          echo "java_version=$JAVA_VER" >> $GITHUB_OUTPUT

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tag list
        id: tags
        run: |
          OWNER="${{ steps.prep.outputs.owner }}"
          TAGS="ghcr.io/${OWNER}/docker-minecraft-paper:${{ matrix.tag }}"
          TAGS="${TAGS},ghcr.io/${OWNER}/docker-minecraft-paper:${{ matrix.version }}-latest"
          
          if [ "${{ matrix.is_latest }}" = "true" ]; then
            TAGS="${TAGS},ghcr.io/${OWNER}/docker-minecraft-paper:latest"
            TAGS="${TAGS},ghcr.io/${OWNER}/docker-minecraft-paper:latest-latest"
            TAGS="${TAGS},ghcr.io/${OWNER}/docker-minecraft-paper:latest-${{ matrix.build }}"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: main.dockerfile
          context: ./docker
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            JAVA_VERSION=${{ steps.detect-java.outputs.java_version }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}
